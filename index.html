<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taynections</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #F9DF6D;
    --green: #A0C35A;
    --blue: #B0C4EF;
    --purple: #BA81C5;
    --bg: #FFFFFF;
    --text: #1A1A1B;
    --tile-bg: #EFEDE8;
    --tile-hover: #E2DFD8;
    --tile-selected: #5A594E;
    --tile-selected-text: #FFFFFF;
    --border: #D3D3D3;
    --mistake-dot: #5A594E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 600px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: #fff;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #1A1A1B;
    text-shadow: none;
  }

  .logo .tay {
    color: #1A1A1B;
  }

  .logo .nections {
    color: #fff;
    background: #9B59B6;
    padding: 0 6px 2px 5px;
    border-radius: 4px;
    display: inline-block;
  }

  .game-num {
    position: absolute;
    right: 16px;
    font-size: 13px;
    color: #777;
    font-weight: 500;
  }

  .subtitle {
    text-align: center;
    padding: 10px 16px 4px;
    font-size: 14px;
    color: #555;
    max-width: 600px;
    width: 100%;
  }

  .instructions {
    text-align: center;
    font-size: 15px;
    color: var(--text);
    padding: 8px 16px 12px;
    font-weight: 500;
    max-width: 600px;
    width: 100%;
  }

  .main {
    width: 100%;
    max-width: 600px;
    padding: 0 16px 16px;
    flex: 1;
  }

  /* Solved categories */
  .solved-categories {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }

  .solved-cat {
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .solved-cat .cat-name {
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .solved-cat .cat-words {
    font-size: 14px;
    font-weight: 500;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .tile {
    background: var(--tile-bg);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 4px;
    min-height: 72px;
    transition: background 0.1s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
    line-height: 1.2;
    word-break: break-word;
    hyphens: auto;
  }

  .tile:hover {
    background: var(--tile-hover);
  }

  .tile.selected {
    background: var(--tile-selected);
    color: var(--tile-selected-text);
  }

  .tile.shake {
    animation: shake 0.5s;
  }

  .tile.bounce {
    animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mistakes-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--mistake-dot);
    display: inline-block;
    transition: opacity 0.3s;
  }

  .dot.used {
    opacity: 0.2;
  }

  .btn {
    border: 1.5px solid var(--text);
    background: transparent;
    color: var(--text);
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, color 0.15s;
  }

  .btn:hover {
    background: var(--text);
    color: #fff;
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn.submit {
    background: var(--text);
    color: #fff;
  }

  .btn.submit:hover {
    background: #333;
  }

  .btn.submit:disabled {
    background: var(--text);
    opacity: 0.35;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .modal .emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .modal p {
    color: #555;
    font-size: 15px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .modal .result-cats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
    text-align: left;
  }

  .result-cat {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
  }

  .result-cat .rcat-name {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 12px;
  }

  .result-cat .rcat-words {
    margin-top: 2px;
    font-weight: 500;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* Nav arrows */
  .game-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    justify-content: center;
    font-size: 14px;
    color: #555;
    max-width: 600px;
    width: 100%;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .nav-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    transition: background 0.1s;
  }

  .nav-btn:hover { background: var(--tile-bg); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Animations */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes bounceIn {
    0% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  @keyframes rowReveal {
    from { transform: scaleY(0); opacity: 0; }
    to { transform: scaleY(1); opacity: 1; }
  }

  .difficulty-bar {
    display: flex;
    gap: 4px;
    justify-content: center;
    padding: 4px 0 10px;
  }

  .diff-pip {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #aaa;
    border-top: 1px solid var(--border);
    width: 100%;
    max-width: 600px;
  }
</style>
</head>

// Color config
const COLOR_CONFIG = {
  1: { bg: '#F9DF6D', label: '🟨' },
  2: { bg: '#A0C35A', label: '🟩' },
  3: { bg: '#B0C4EF', label: '🟦' },
  4: { bg: '#BA81C5', label: '🟪' }
};

// =====================================================================
// GAME STATE
// =====================================================================
let currentGameIdx = 0;
let selectedWords = [];
let mistakes = 4;
let solvedColors = [];
let tiles = []; // shuffled word list for current game
let gameOver = false;

function loadGame(idx) {
  currentGameIdx = idx;
  selectedWords = [];
  mistakes = 4;
  solvedColors = [];
  gameOver = false;

  const game = GAMES[idx];
  // Build flat word list
  let words = [];
  game.cats.forEach(cat => {
    cat.words.forEach(w => words.push(w));
  });
  tiles = shuffle(words);

  document.getElementById('gameNumLabel').textContent = `Game ${idx+1}/100`;
  document.getElementById('navLabel').textContent = `Game ${idx+1}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === GAMES.length - 1;

  renderSolved();
  renderGrid();
  renderDots();
  updateButtons();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  // Only show unsolved tiles
  const solvedWords = getSolvedWords();
  const currentTiles = tiles.filter(w => !solvedWords.includes(w));

  currentTiles.forEach(word => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (selectedWords.includes(word) ? ' selected' : '');
    tile.textContent = word;
    tile.addEventListener('click', () => toggleWord(word, tile));
    grid.appendChild(tile);
  });
}

function getSolvedWords() {
  let words = [];
  solvedColors.forEach(color => {
    const cat = GAMES[currentGameIdx].cats.find(c => c.color === color);
    if (cat) cat.words.forEach(w => words.push(w));
  });
  return words;
}

function renderSolved() {
  const container = document.getElementById('solvedCats');
  container.innerHTML = '';
  solvedColors.forEach(color => {
    const cat = GAMES[currentGameIdx].cats.find(c => c.color === color);
    const div = document.createElement('div');
    div.className = 'solved-cat';
    div.style.background = COLOR_CONFIG[color].bg;
    div.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-words">${cat.words.join(', ')}</div>`;
    container.appendChild(div);
  });
}

function renderDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i >= mistakes ? ' used' : '');
    dotsEl.appendChild(dot);
  }
}

function updateButtons() {
  document.getElementById('submitBtn').disabled = selectedWords.length !== 4 || gameOver;
  document.getElementById('deselectBtn').disabled = selectedWords.length === 0;
  document.getElementById('shuffleBtn').disabled = gameOver;
}

function toggleWord(word, tileEl) {
  if (gameOver) return;
  if (selectedWords.includes(word)) {
    selectedWords = selectedWords.filter(w => w !== word);
  } else {
    if (selectedWords.length >= 4) return;
    selectedWords.push(word);
  }
  renderGrid();
  updateButtons();
}

function submit() {
  if (selectedWords.length !== 4) return;

  const game = GAMES[currentGameIdx];
  // Check each category
  let matched = null;
  game.cats.forEach(cat => {
    if (solvedColors.includes(cat.color)) return;
    const allMatch = selectedWords.every(w => cat.words.includes(w));
    if (allMatch) matched = cat;
  });

  if (matched) {
    // Correct!
    solvedColors.push(matched.color);
    tiles = tiles.filter(w => !matched.words.includes(w));
    selectedWords = [];

    renderSolved();
    renderGrid();
    renderDots();
    updateButtons();

    if (solvedColors.length === 4) {
      setTimeout(() => showModal(true), 400);
    } else {
      // Check if one away
    }
    showToast('Correct! ✨');
  } else {
    // Check "one away"
    let bestMatch = 0;
    game.cats.forEach(cat => {
      if (solvedColors.includes(cat.color)) return;
      const count = selectedWords.filter(w => cat.words.includes(w)).length;
      if (count > bestMatch) bestMatch = count;
    });

    mistakes--;
    renderDots();

    if (bestMatch === 3) {
      showToast('One away... 👀');
    } else {
      showToast('Not quite! Try again');
    }

    // Shake tiles
    shakeSelected();
    selectedWords = [];
    setTimeout(() => { renderGrid(); updateButtons(); }, 600);

    if (mistakes <= 0) {
      setTimeout(() => showModal(false), 700);
      gameOver = true;
    }
  }
}

function shakeSelected() {
  const gridEl = document.getElementById('grid');
  const tileEls = gridEl.querySelectorAll('.tile.selected');
  tileEls.forEach(t => {
    t.classList.add('shake');
    setTimeout(() => t.classList.remove('shake'), 500);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function showModal(won) {
  const overlay = document.getElementById('modalOverlay');
  const emoji = document.getElementById('modalEmoji');
  const title = document.getElementById('modalTitle');
  const msg = document.getElementById('modalMsg');
  const catsEl = document.getElementById('modalCats');

  emoji.textContent = won ? '🎉' : '😢';
  title.textContent = won ? 'Amazing, Swiftie!' : 'Better Luck Next Time!';
  msg.textContent = won
    ? `You completed Game ${currentGameIdx+1} with ${4 - mistakes} mistake${4-mistakes===1?'':'s'}!`
    : `The categories were:`;

  catsEl.innerHTML = '';
  GAMES[currentGameIdx].cats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'result-cat';
    div.style.background = COLOR_CONFIG[cat.color].bg;
    div.innerHTML = `<div class="rcat-name">${cat.name}</div><div class="rcat-words">${cat.words.join(', ')}</div>`;
    catsEl.appendChild(div);
  });

  const nextBtn = document.getElementById('modalNext');
  nextBtn.style.display = currentGameIdx < GAMES.length - 1 ? '' : 'none';

  overlay.classList.add('open');
}

// Events
document.getElementById('submitBtn').addEventListener('click', submit);

document.getElementById('shuffleBtn').addEventListener('click', () => {
  const solvedWords = getSolvedWords();
  const remaining = tiles.filter(w => !solvedWords.includes(w));
  const shuffled = shuffle(remaining);
  tiles = [...tiles.filter(w => solvedWords.includes(w)), ...shuffled];
  selectedWords = [];
  renderGrid();
  updateButtons();
});

document.getElementById('deselectBtn').addEventListener('click', () => {
  selectedWords = [];
  renderGrid();
  updateButtons();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentGameIdx > 0) loadGame(currentGameIdx - 1);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentGameIdx < GAMES.length - 1) loadGame(currentGameIdx + 1);
});

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalNext').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
  if (currentGameIdx < GAMES.length - 1) loadGame(currentGameIdx + 1);
});

// Start
loadGame(0);
</script>
</body>
</html>
