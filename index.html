<link href="https://fonts.googleapis.com/css2?family=Rouge+Script&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #E8C84A;
    --green: #8FAF5A;
    --blue: #6BAED6;
    --purple: #9B78C8;
    --bg: #C4AEDC;
    --text: #2a1a3a;
    --tile-bg: #EDE8F5;
    --tile-hover: #DDD6EE;
    --tile-selected: #3a2050;
    --tile-selected-text: #FFFFFF;
    --border: rgba(255,255,255,0.4);
    --mistake-dot: #3a2050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #C4AEDC; }
  body {
    font-family: "DM Sans", sans-serif;
    background: #C4AEDC;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    max-width: 600px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: #fff;
  }
  .logo {
    font-family: "Rouge Script", cursive;
    font-size: 52px;
    font-weight: 400;
    letter-spacing: 1px;
    color: #2a1a3a;
    line-height: 1;
  }
  .game-num {
    position: absolute;
    right: 16px;
    font-size: 13px;
    color: #5a3a6a;
    font-weight: 500;
  }
  .game-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    justify-content: center;
    font-size: 14px;
    color: #2a1a3a;
    max-width: 600px;
    width: 100%;
    background: #C4AEDC;
    border-bottom: 1px solid rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }
  .nav-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    font-family: "DM Sans", sans-serif;
    font-weight: 600;
    transition: background 0.1s;
  }
  .nav-btn:hover { background: var(--tile-bg); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .subtitle {
    text-align: center;
    padding: 10px 16px 4px;
    font-size: 14px;
    color: #2a1a3a;
    max-width: 600px;
    width: 100%;
    background: #C4AEDC;
  }
  .instructions {
    text-align: center;
    font-size: 15px;
    color: #2a1a3a;
    padding: 8px 16px 12px;
    font-weight: 500;
    max-width: 600px;
    width: 100%;
    background: #C4AEDC;
  }
  .main {
    width: 100%;
    max-width: 600px;
    padding: 0 16px 16px;
    flex: 1;
    background: #C4AEDC;
  }
  .solved-categories {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .solved-cat {
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .solved-cat .cat-name {
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .solved-cat .cat-words { font-size: 14px; font-weight: 500; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .tile {
    background: var(--tile-bg);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 4px;
    min-height: 72px;
    transition: background 0.1s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
    line-height: 1.2;
    word-break: break-word;
    hyphens: auto;
  }
  .tile:hover { background: var(--tile-hover); }
  .tile.selected { background: var(--tile-selected); color: var(--tile-selected-text); }
  .tile.shake { animation: shake 0.5s; }
  .mistakes-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: #2a1a3a;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--mistake-dot);
    display: inline-block;
    transition: opacity 0.3s;
  }
  .dot.used { opacity: 0.2; }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    border: 1.5px solid #3a2050;
    background: transparent;
    color: #3a2050;
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: "DM Sans", sans-serif;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: #3a2050; color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.submit { background: #3a2050; color: #fff; }
  .btn.submit:hover { background: #2a1040; }
  .btn.submit:disabled { background: #3a2050; opacity: 0.35; }
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #3a2050;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal h2 { font-family: "Rouge Script", cursive; font-size: 36px; margin-bottom: 8px; }
  .modal .emoji { font-size: 48px; margin-bottom: 12px; }
  .modal p { color: #555; font-size: 15px; margin-bottom: 20px; line-height: 1.5; }
  .modal .result-cats { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; text-align: left; }
  .result-cat { border-radius: 8px; padding: 10px 14px; font-size: 13px; }
  .result-cat .rcat-name { font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; font-size: 12px; }
  .result-cat .rcat-words { margin-top: 2px; font-weight: 500; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #5a3a6a;
    background: #C4AEDC;
    border-top: 1px solid rgba(255,255,255,0.3);
    width: 100%;
    max-width: 600px;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
</style>
</head>

</div>

var COLOR_CONFIG = {
  1: { bg: "#E8C84A" },
  2: { bg: "#8FAF5A" },
  3: { bg: "#6BAED6" },
  4: { bg: "#9B78C8" }
};

var currentGameIdx = 0;
var selectedWords = [];
var mistakes = 4;
var solvedColors = [];
var tiles = [];
var gameOver = false;

function loadGame(idx) {
  currentGameIdx = idx;
  selectedWords = [];
  mistakes = 4;
  solvedColors = [];
  gameOver = false;

  var game = GAMES[idx];
  var words = [];
  game.cats.forEach(function(cat) {
    cat.words.forEach(function(w) { words.push(w); });
  });
  tiles = shuffleArr(words);

  document.getElementById("gameNumLabel").textContent = "Game " + (idx+1) + "/100";
  document.getElementById("navLabel").textContent = "Game " + (idx+1);
  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === GAMES.length - 1;

  renderSolved();
  renderGrid();
  renderDots();
  updateButtons();
}

function shuffleArr(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function getSolvedWords() {
  var words = [];
  solvedColors.forEach(function(color) {
    var cat = GAMES[currentGameIdx].cats.find(function(c) { return c.color === color; });
    if (cat) cat.words.forEach(function(w) { words.push(w); });
  });
  return words;
}

function renderGrid() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var solvedWords = getSolvedWords();
  var current = tiles.filter(function(w) { return solvedWords.indexOf(w) === -1; });

  current.forEach(function(word) {
    var tile = document.createElement("div");
    tile.className = "tile" + (selectedWords.indexOf(word) !== -1 ? " selected" : "");
    tile.textContent = word;
    tile.addEventListener("click", function() { toggleWord(word); });
    grid.appendChild(tile);
  });
}

function renderSolved() {
  var container = document.getElementById("solvedCats");
  container.innerHTML = "";
  solvedColors.forEach(function(color) {
    var cat = GAMES[currentGameIdx].cats.find(function(c) { return c.color === color; });
    var div = document.createElement("div");
    div.className = "solved-cat";
    div.style.background = COLOR_CONFIG[color].bg;
    div.innerHTML = "<div class=\"cat-name\">" + cat.name + "</div><div class=\"cat-words\">" + cat.words.join(", ") + "</div>";
    container.appendChild(div);
  });
}

function renderDots() {
  var dotsEl = document.getElementById("dots");
  dotsEl.innerHTML = "";
  for (var i = 0; i < 4; i++) {
    var dot = document.createElement("span");
    dot.className = "dot" + (i >= mistakes ? " used" : "");
    dotsEl.appendChild(dot);
  }
}

function updateButtons() {
  document.getElementById("submitBtn").disabled = selectedWords.length !== 4 || gameOver;
  document.getElementById("deselectBtn").disabled = selectedWords.length === 0;
  document.getElementById("shuffleBtn").disabled = gameOver;
}

function toggleWord(word) {
  if (gameOver) return;
  var idx = selectedWords.indexOf(word);
  if (idx !== -1) {
    selectedWords.splice(idx, 1);
  } else {
    if (selectedWords.length >= 4) return;
    selectedWords.push(word);
  }
  renderGrid();
  updateButtons();
}

function submit() {
  if (selectedWords.length !== 4) return;
  var game = GAMES[currentGameIdx];
  var matched = null;

  game.cats.forEach(function(cat) {
    if (solvedColors.indexOf(cat.color) !== -1) return;
    var allMatch = selectedWords.every(function(w) { return cat.words.indexOf(w) !== -1; });
    if (allMatch) matched = cat;
  });

  if (matched) {
    solvedColors.push(matched.color);
    tiles = tiles.filter(function(w) { return matched.words.indexOf(w) === -1; });
    selectedWords = [];
    renderSolved();
    renderGrid();
    renderDots();
    updateButtons();
    if (solvedColors.length === 4) {
      setTimeout(function() { showModal(true); }, 400);
    } else {
      showToast("Correct! ✨");
    }
  } else {
    var bestMatch = 0;
    game.cats.forEach(function(cat) {
      if (solvedColors.indexOf(cat.color) !== -1) return;
      var count = selectedWords.filter(function(w) { return cat.words.indexOf(w) !== -1; }).length;
      if (count > bestMatch) bestMatch = count;
    });

    mistakes--;
    renderDots();
    showToast(bestMatch === 3 ? "One away... 👀" : "Not quite! Try again");
    shakeSelected();
    selectedWords = [];
    setTimeout(function() { renderGrid(); updateButtons(); }, 600);

    if (mistakes <= 0) {
      gameOver = true;
      setTimeout(function() { showModal(false); }, 700);
    }
  }
}

function shakeSelected() {
  var tileEls = document.getElementById("grid").querySelectorAll(".tile.selected");
  tileEls.forEach(function(t) {
    t.classList.add("shake");
    setTimeout(function() { t.classList.remove("shake"); }, 500);
  });
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2000);
}

function showModal(won) {
  document.getElementById("modalEmoji").textContent = won ? "🎉" : "😢";
  document.getElementById("modalTitle").textContent = won ? "Amazing, Swiftie!" : "Better Luck Next Time!";
  document.getElementById("modalMsg").textContent = won
    ? "You completed Game " + (currentGameIdx+1) + " with " + (4-mistakes) + " mistake" + (4-mistakes===1?"":"s") + "!"
    : "The categories were:";

  var catsEl = document.getElementById("modalCats");
  catsEl.innerHTML = "";
  GAMES[currentGameIdx].cats.forEach(function(cat) {
    var div = document.createElement("div");
    div.className = "result-cat";
    div.style.background = COLOR_CONFIG[cat.color].bg;
    div.innerHTML = "<div class=\"rcat-name\">" + cat.name + "</div><div class=\"rcat-words\">" + cat.words.join(", ") + "</div>";
    catsEl.appendChild(div);
  });

  var nextBtn = document.getElementById("modalNext");
  nextBtn.style.display = currentGameIdx < GAMES.length - 1 ? "" : "none";
  document.getElementById("modalOverlay").classList.add("open");
}

document.getElementById("submitBtn").addEventListener("click", submit);

document.getElementById("shuffleBtn").addEventListener("click", function() {
  var solvedWords = getSolvedWords();
  var remaining = tiles.filter(function(w) { return solvedWords.indexOf(w) === -1; });
  tiles = solvedWords.concat(shuffleArr(remaining));
  selectedWords = [];
  renderGrid();
  updateButtons();
});

document.getElementById("deselectBtn").addEventListener("click", function() {
  selectedWords = [];
  renderGrid();
  updateButtons();
});

document.getElementById("prevBtn").addEventListener("click", function() {
  if (currentGameIdx > 0) loadGame(currentGameIdx - 1);
});

document.getElementById("nextBtn").addEventListener("click", function() {
  if (currentGameIdx < GAMES.length - 1) loadGame(currentGameIdx + 1);
});

document.getElementById("modalClose").addEventListener("click", function() {
  document.getElementById("modalOverlay").classList.remove("open");
});

document.getElementById("modalNext").addEventListener("click", function() {
  document.getElementById("modalOverlay").classList.remove("open");
  if (currentGameIdx < GAMES.length - 1) loadGame(currentGameIdx + 1);
});

loadGame(0);
</script>
